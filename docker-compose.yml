services:
  db:
    image: mysql:8.0
    container_name: rehab_db_container
    restart: always
    env_file: .env # <--- Leemos directamente del archivo .env
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # Mismo comportamiento que XAMPP
      MYSQL_DATABASE: ${DB_NAME}        # Usamos variables del .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./RehabWeb-Api-master
    container_name: rehab_backend
    volumes:
      - ./RehabWeb-Api-master:/app # Hot-reload (cambios en vivo)
    ports:
      - "8000:8000"
    env_file: .env # <--- Leemos directamente del archivo .env
    depends_on:
      - db

volumes:
  db_data:
