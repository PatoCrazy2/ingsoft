services:
  db:
    image: mysql:8.0
    container_name: rehab_db_container
    restart: always
    env_file: .env
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      # Nombre fijo: si .env deja DB_NAME vacío, MySQL no creaba la BD al primer arranque.
      MYSQL_DATABASE: rehab_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./RehabWeb-Api-master
    container_name: rehab_backend
    volumes:
      - ./RehabWeb-Api-master:/app # Hot-reload (cambios en vivo)
    ports:
      # 8002 evita choque con otros servicios en :8000 (p. ej. uvicorn en 127.0.0.1).
      - "8002:8000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-rehab_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      RUN_SEED_DEMO: "1"
    depends_on:
      - db

volumes:
  db_data:
